spring.application.name=portfolio-site-v6-prodigy-api
spring.profiles.active=local

# Default is 1MB, too small for a full-size WebP re-encode of a high-entropy source image
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# In-cluster address of the ui Service (see k8s/ui.yaml) - BlogPreviewController fetches the
# real, currently-deployed index.html from here rather than hardcoding a copy, so its asset
# references never go stale when the ui image is redeployed independently of the api image.
ui.internal-base-url=http://ui
