apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio
  namespace: portfolio-site-v6-prodigy
spec:
  ingressClassName: traefik
  rules:
    - host: sresthaa.com
      http:
        paths:
          # More specific than / below, so ingress-spec longest-prefix-match routing sends /blog
          # and /blog/* here regardless of listed order - see BlogPreviewController for why.
          - path: /blog
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 80
    - host: www.sresthaa.com
      http:
        paths:
          - path: /blog
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 80
    - host: api.sresthaa.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
    - host: admin.sresthaa.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 80
