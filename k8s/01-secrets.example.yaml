# Not applied directly - documents the keys the API Deployment expects via envFrom.
# Real Secrets are created imperatively (kubectl create secret ... --from-literal=...)
# and never committed, same trust boundary as application-local.properties.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: portfolio-site-v6-prodigy
type: Opaque
stringData:
  POSTGRES_DB: portfolio
  POSTGRES_USER: REPLACE_ME
  POSTGRES_PASSWORD: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: portfolio-site-v6-prodigy
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio
  SPRING_DATASOURCE_USERNAME: REPLACE_ME
  SPRING_DATASOURCE_PASSWORD: REPLACE_ME
  JWT_SECRET: REPLACE_ME_BASE64_48_BYTES
  JWT_EXPIRATION_MINUTES: "60"
  TOTP_SECRET_ENCRYPTION_KEY: REPLACE_ME_BASE64_32_BYTES
  CORS_ALLOWED_ORIGINS: http://portfolio.local:8080,http://admin.portfolio.local:8080
  WEBAUTHN_RELYING_PARTY_ID: admin.portfolio.local
  WEBAUTHN_RELYING_PARTY_NAME: Portfolio Admin
  WEBAUTHN_ORIGIN: http://admin.portfolio.local:8080
  R2_ACCOUNT_ID: REPLACE_ME
  R2_ACCESS_KEY_ID: REPLACE_ME
  R2_SECRET_ACCESS_KEY: REPLACE_ME
  R2_BUCKET_NAME: REPLACE_ME
  R2_ENDPOINT: https://REPLACE_ME.r2.cloudflarestorage.com
  R2_PUBLIC_BASE_URL: https://REPLACE_ME.r2.dev
